<div class="mis-citas-container">
  <div class="mis-citas-card">
    <div class="mis-citas-header">
      <h1>Mis Citas</h1>
      <button type="button" class="close-btn" (click)="volverAlInicio()">&times;</button>
    </div>

    <div class="mis-citas-content" *ngIf="appointments.length > 0; else emptyState">
      <article class="appointment-item" *ngFor="let appointment of appointments">
        <h3>{{ formatAppointmentDate(appointment.appointmentDate) }}</h3>
        <p>{{ appointment.startTime }}</p>
      </article>
    </div>

    <ng-template #emptyState>
      <div class="mis-citas-content">
        <p class="empty-copy">Aun no tienes citas reservadas.</p>
      </div>
    </ng-template>
  </div>
</div>
