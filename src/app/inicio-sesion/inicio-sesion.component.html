<div class="container-fluid px-4 px-lg-5 d-flex justify-content-center align-items-center vh-100">
  <div class="auth-card shadow-sm border rounded-3 bg-white" style="max-width: 820px; width: 100%;">
    
    <div class="p-5">
      <h2 class="fw-bold mb-4" style="color: #333;">Iniciar Sesión</h2>
      
      <p class="text-muted mb-3" style="font-size: 0.85rem;">ladue gmail seroit</p>

      <form>
        <div class="input-group mb-3">
          <span class="input-group-text bg-white border-end-0 text-muted">
            📧
          </span>
          <input type="email" class="form-control border-start-0 ps-0" placeholder="Email">
        </div>

        <div class="input-group mb-4">
          <span class="input-group-text bg-white border-end-0 text-muted">
            🔒
          </span>
          <input type="password" class="form-control border-start-0 ps-0" placeholder="Contraseña">
        </div>

        <button type="button" routerLink="/home" class="btn w-100 py-3 text-white fs-6 fw-medium mb-4" 
                style="background-color: #d17871; border: none; border-radius: 6px;">
          Iniciar Sesión
        </button>

        <div class="d-flex align-items-center mb-4">
          <hr class="flex-grow-1 border-secondary opacity-25">
          <span class="mx-3 text-muted fs-6 fw-semibold">O inicia sesion con</span>
          <hr class="flex-grow-1 border-secondary opacity-25">
        </div>

        <div class="d-flex justify-content-center">
          <button type="button" class="btn btn-outline-light border shadow-sm px-5 py-3 d-flex align-items-center text-dark bg-white fs-5 justify-content-center w-auto">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="26" class="me-2">
            Iniciar sesión con Google
          </button>
        </div>

        <hr class="mt-4 mb-4 border-secondary opacity-25">

        <div class="text-center mt-3">
          <span class="text-muted fs-6">¿No tienes cuenta? </span>
          <a routerLink="/registro" class="text-decoration-none fw-bold fs-6" style="color: #6d9cc1;">Regístrate ></a>
        </div>
      </form>
    </div>
  </div>
</div>
